<div class="gitwf">
<style>
html,body{margin:0;padding:0;}
.gitwf{
  --main:#185FA5; --feat:#534AB7; --merge:#0F6E56; --edge:#B4B2A9;
  --surface-2:#ffffff; --surface-1:#f3f1ea; --text-primary:#1f1f1d;
  --text-secondary:#5f5e5a; --text-muted:#8a897f; --border-strong:#c9c7bd;
  --radius:8px; --font-sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  font-family:var(--font-sans); max-width:680px; margin:0 auto; padding:0;
}
@media (prefers-color-scheme:dark){
  .gitwf{
    --main:#85B7EB; --feat:#AFA9EC; --merge:#5DCAA5; --edge:#5F5E5A;
    --surface-2:#2c2c2a; --surface-1:#26262420; --text-primary:#ecebe4;
    --text-secondary:#b4b2a9; --text-muted:#888780; --border-strong:#5f5e5a;
  }
}
.gitwf button{
  font-family:inherit; font-size:14px; color:var(--text-primary);
  background:transparent; border:0.5px solid var(--border-strong);
  border-radius:var(--radius); padding:6px 12px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
}
.gitwf button:hover{ background:var(--surface-1); }
.gitwf button:active{ transform:scale(0.98); }
.gitwf .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
</style>

<h2 class="sr-only">Step-through diagram of a feature-branch workflow: branch off main so it stays stable, make commits on the branch, then squash-merge the finished feature into main as a single new commit.</h2>

<svg id="gwf" width="100%" viewBox="0 0 680 248" role="img" style="font-family:var(--font-sans);display:block;">
<title>git branch workflow</title><desc>Commit graph that updates per step.</desc>
</svg>

<div style="min-height:64px;margin:6px 4px 0;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
    <span style="font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;" id="gwf-count">1 / 6</span>
    <code id="gwf-cmd" style="font-family:var(--font-mono);font-size:14px;color:var(--text-primary);background:var(--surface-1);padding:3px 9px;border-radius:var(--radius);"></code>
  </div>
  <p id="gwf-note" style="margin:0;font-size:14px;line-height:1.6;color:var(--text-secondary);"></p>
</div>

<div style="display:flex;align-items:center;gap:12px;margin:14px 4px 0;">
  <button id="gwf-prev" aria-label="Previous step">&larr;</button>
  <div id="gwf-dots" style="display:flex;gap:7px;flex:1;align-items:center;"></div>
  <button id="gwf-next">Next &rarr;</button>
</div>

<div style="display:flex;gap:16px;margin:14px 4px 0;font-size:12px;color:var(--text-secondary);">
  <span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:50%;background:var(--main);"></span>main</span>
  <span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:50%;background:var(--feat);"></span>feature branch</span>
</div>
</div>

<script>
(function(){
  const C={c0:{x:110,y:215,br:'main'},cf1:{x:250,y:95,br:'feat'},cf2:{x:370,y:95,br:'feat'},cs:{x:490,y:215,br:'main'}};
  const E={e1:['c0','cf1'],e2:['cf1','cf2'],e3:['c0','cs']};
  const COL={main:'var(--main)',feat:'var(--feat)',merge:'var(--merge)'};
  const FB='name/add_feature';
  const S=[
    {cmd:'git status',note:'You start on main, at the current commit. main is your stable, working version \u2014 you will leave it untouched while you build the feature.',nodes:['c0'],edges:[],head:'c0',active:'main',branches:{main:'c0'}},
    {cmd:'git switch -c name/add_feature',note:'Create a feature branch and switch to it. Your work now happens here, so main stays stable and usable the whole time.',nodes:['c0'],edges:[],head:'c0',active:FB,branches:{main:'c0',[FB]:'c0'}},
    {cmd:'git commit',note:'Do some work and commit it. Your branch moves forward; main does not change.',nodes:['c0','cf1'],edges:['e1'],head:'cf1',active:FB,branches:{main:'c0',[FB]:'cf1'}},
    {cmd:'git commit',note:'Another commit on your branch. All the in-progress work stays off main \u2014 anyone using main still gets the stable version.',nodes:['c0','cf1','cf2'],edges:['e1','e2'],head:'cf2',active:FB,branches:{main:'c0',[FB]:'cf2'}},
    {cmd:'git switch main',note:'Switch back to main when you need the stable version \u2014 it is exactly as you left it. Your feature commits are safe on their own branch.',nodes:['c0','cf1','cf2'],edges:['e1','e2'],head:'c0',active:'main',branches:{main:'c0',[FB]:'cf2'}},
    {cmd:'git merge --squash name/add_feature',note:'Squash and merge: your branch commits are combined into a single new commit on main. main gains exactly one commit containing the whole feature, and becomes the new stable version. The individual branch commits stay on the branch.',nodes:['c0','cf1','cf2','cs'],edges:['e1','e2','e3'],head:'cs',active:'main',branches:{main:'cs',[FB]:'cf2'},squash:['cf2','cs']}
  ];
  let i=0;
  const svg=document.getElementById('gwf');
  function line(a,b){return '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="var(--edge)" stroke-width="2.5" stroke-linecap="round"/>';}
  function node(c){const col=COL[c.br];return '<circle cx="'+c.x+'" cy="'+c.y+'" r="18" fill="var(--surface-2)" stroke="'+col+'" stroke-width="2"/><circle cx="'+c.x+'" cy="'+c.y+'" r="6" fill="'+col+'"/>';}
  function ring(c,col){return '<circle cx="'+c.x+'" cy="'+c.y+'" r="27" fill="none" stroke="'+col+'" stroke-width="2" stroke-dasharray="4 4"/>';}
  function txt(x,y,t,fill){return '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="'+fill+'">'+t+'</text>';}
  function branch(b,tip,active){
    const c=C[tip],feat=(b!=='main'),col=feat?'var(--feat)':'var(--main)';
    const pcy=feat?c.y-50:c.y+38, w=b.length*7+22, h=22, x=c.x-w/2, y=pcy-h/2;
    let s='';
    if(feat){s+='<line x1="'+c.x+'" y1="'+(c.y-18)+'" x2="'+c.x+'" y2="'+(pcy+h/2)+'" stroke="var(--edge)" stroke-width="1.5"/>';}
    else{s+='<line x1="'+c.x+'" y1="'+(c.y+18)+'" x2="'+c.x+'" y2="'+(pcy-h/2)+'" stroke="var(--edge)" stroke-width="1.5"/>';}
    if(active){s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="11" fill="'+col+'"/>'+txt(c.x,pcy,b,'var(--surface-2)');}
    else{s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="11" fill="var(--surface-2)" stroke="'+col+'" stroke-width="1.5"/>'+txt(c.x,pcy,b,col);}
    if(active){const hx=x+w+8,hw=46;s+='<line x1="'+(x+w)+'" y1="'+pcy+'" x2="'+hx+'" y2="'+pcy+'" stroke="var(--edge)" stroke-width="1.5"/>';s+='<rect x="'+hx+'" y="'+y+'" width="'+hw+'" height="'+h+'" rx="6" fill="var(--text-primary)"/>'+txt(hx+hw/2,pcy,'HEAD','var(--surface-2)');}
    return s;
  }
  function render(){
    const s=S[i];let out='';
    if(s.squash){const a=C[s.squash[0]],b=C[s.squash[1]];const mx=(a.x+b.x)/2;out+='<path d="M'+a.x+' '+(a.y+18)+' C'+mx+' '+(a.y+40)+','+mx+' '+(b.y-40)+','+b.x+' '+(b.y-20)+'" fill="none" stroke="var(--feat)" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.8"/>';out+=txt(mx+6,(a.y+b.y)/2,'squashed','var(--feat)');}
    s.edges.forEach(e=>{out+=line(C[E[e][0]],C[E[e][1]]);});
    s.nodes.forEach(n=>{out+=node(C[n]);});
    out+=ring(C[s.head], s.active==='main'?'var(--main)':'var(--feat)');
    Object.entries(s.branches).forEach(([b,tip])=>{out+=branch(b,tip,b===s.active);});
    svg.innerHTML='<title>git branch workflow</title><desc>step</desc><g transform="translate(0,-22)">'+out+'</g>';
    document.getElementById('gwf-cmd').textContent=s.cmd;
    document.getElementById('gwf-note').textContent=s.note;
    document.getElementById('gwf-count').textContent=(i+1)+' / '+S.length;
    document.getElementById('gwf-next').innerHTML = i===S.length-1 ? '\u21bb Restart' : 'Next \u2192';
    const dots=document.getElementById('gwf-dots');dots.innerHTML='';
    S.forEach((_,k)=>{const d=document.createElement('button');d.setAttribute('aria-label','Go to step '+(k+1));d.style.cssText='width:9px;height:9px;padding:0;min-width:0;border-radius:50%;border:none;cursor:pointer;background:'+(k===i?'var(--text-primary)':'var(--border-strong)')+';';d.onclick=()=>{i=k;render();};dots.appendChild(d);});
  }
  document.getElementById('gwf-prev').onclick=()=>{i=Math.max(0,i-1);render();};
  document.getElementById('gwf-next').onclick=()=>{i=i===S.length-1?0:i+1;render();};
  render();
  function postHeight(){
    try{ if(window.parent!==window){ window.parent.postMessage({type:'gwf-height',height:document.documentElement.scrollHeight},'*'); } }catch(e){}
  }
  postHeight();
  window.addEventListener('resize',postHeight);
  new MutationObserver(postHeight).observe(document.body,{subtree:true,childList:true,attributes:true});
})();
</script>
