name: MyST GitHub Pages Deploy
on:
  push:
    branches:
      - '**'

env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref_name == vars.BUILD_BRANCH
    environment:
      name: gh-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Install MyST Markdown
        run: npm install -g mystmd
      - name: Install Python dependencies
        run: pip install deep-translator pyyaml
      - name: Build HTML Assets
        run: myst build --html
      - name: Translate and build French site
        run: python3 scripts/build-french.py
      - name: Inject Language Switcher
        run: python3 scripts/inject-language-switcher.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4