# See docs at: https://mystmd.org/guide/frontmatter
version: 1

project:
  title: My Book Title
  subtitle: A short description of this book
  copyright: '2026'
  keywords:
    - keyword1
    - keyword2
  github: https://github.com/polymtl-reproducible-research/myst_book
  subject: Book
  numbering:
    headings: true
  open_access: true
  license: MIT
  date: 2026-03-27
  exports:
    - format: pdf
  abbreviations:
    # Add abbreviations here, e.g.:
    # MRI: Magnetic resonance imaging
    PR: Pull request
    CI: Continuous Integration
    VS Code: Visual Studio Code
  exclude:
    - README.md
    - LICENSE
    - mooc/**
  bibliography:
    - bibliography/references.bib
  toc:
    - file: index.md
    - title: Lectures
      children:
        - file: lectures/lecture1.md
        - file: lectures/lecture2.md
        - file: lectures/lecture3.md
        - file: lectures/lecture4.md
        - file: lectures/lecture5.md
    - title: Labs
      children:
        - file: labs/lab1.md
        - file: labs/lab2.md
        - file: labs/lab3.md
        - file: labs/lab4.md
        - file: labs/lab5.md

site:
  template: book-theme
  options:
    favicon: favicon.ico
    logo: ./images/site_logo.png
    logo_dark: ./images/site_logo_dark.png
    style: poly.css
    logo_text: My Book
  actions:
    - title: GitHub
      url: https://github.com/polymtl-reproducible-research/myst_book
